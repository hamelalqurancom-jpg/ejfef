<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعلان مسابقة حامل القرآن الكريم | اليوم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gold: linear-gradient(135deg, #d4af37 0%, #f9f295 45%, #b8860b 70%, #d4af37 100%);
            --deep-charcoal: #0a0a0a;
            --emerald-accent: #062c16;
            --text-gold: #d4af37;
            --text-off: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        .poster-container {
            width: 1080px;
            height: 1350px; /* Instagram portrait ratio */
            background: var(--deep-charcoal);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 100px 60px;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.1);
        }

        /* Decorative Background Elements */
        .poster-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.1;
        }

        .islamic-pattern {
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            border: 2px solid rgba(212, 175, 55, 0.05);
            border-radius: 50%;
            transform: rotate(45deg);
        }

        .islamic-pattern::after {
            content: '';
            position: absolute;
            inset: 40px;
            border: 1px solid rgba(212, 175, 55, 0.03);
            border-radius: 50%;
        }

        .top-badge {
            background: var(--primary-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 30px;
            letter-spacing: 10px;
            text-transform: uppercase;
            animation: fadeInDown 1s ease-out;
        }

        .announcement-box {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px 60px;
            border-radius: 100px;
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
            animation: pulse 2s infinite alternate;
        }

        .announcement-box span {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .main-title {
            text-align: center;
            margin-bottom: 80px;
            position: relative;
        }

        .main-title h1 {
            font-family: 'Amiri', serif;
            font-size: 6.5rem;
            background: var(--primary-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        .main-title h2 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 3.5rem;
            color: var(--text-off);
            margin-top: -10px;
            letter-spacing: 2px;
        }

        .divider {
            width: 300px;
            height: 2px;
            background: var(--primary-gold);
            margin: 40px auto;
            position: relative;
        }

        .divider::after {
            content: '⬥';
            color: #f9f295;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--deep-charcoal);
            padding: 0 15px;
            font-size: 1.5rem;
        }

        .categories {
            display: flex;
            gap: 40px;
            width: 100%;
            justify-content: space-between;
        }

        .cat-card {
            flex: 1;
            background: linear-gradient(180deg, rgba(20, 20, 20, 0.8) 0%, rgba(10, 10, 10, 0.95) 100%);
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 50px 40px;
            border-radius: 30px;
            position: relative;
            transition: all 0.3s ease;
        }

        .cat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 80%; height: 1px;
            background: var(--primary-gold);
            opacity: 0.5;
        }

        .cat-card h3 {
            color: var(--text-gold);
            font-size: 2.2rem;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 15px;
            display: inline-block;
        }

        .level-item {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .level-item i {
            color: var(--text-gold);
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px var(--text-gold));
        }

        .footer {
            margin-top: auto;
            text-align: center;
            width: 100%;
        }

        .url {
            font-size: 2.5rem;
            color: var(--text-gold);
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .meta-info {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 1.2rem;
        }

        .meta-info span i {
            margin-left: 8px;
            color: var(--text-gold);
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
            to { transform: scale(1.02); box-shadow: 0 0 40px rgba(212, 175, 55, 0.3); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Golden Border */
        .outer-frame {
            position: absolute;
            inset: 30px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid var(--text-gold);
        }

        .t-l { top: 0; left: 0; border-right: none; border-bottom: none; }
        .t-r { top: 0; right: 0; border-left: none; border-bottom: none; }
        .b-l { bottom: 0; left: 0; border-right: none; border-top: none; }
        .b-r { bottom: 0; right: 0; border-left: none; border-top: none; }

    </style>
</head>
<body>

    <div class="poster-container" id="poster">
        <div class="outer-frame">
            <div class="corner t-l"></div>
            <div class="corner t-r"></div>
            <div class="corner b-l"></div>
            <div class="corner b-r"></div>
        </div>

        <div class="islamic-pattern"></div>
        
        <div class="top-badge">إعلان هام</div>

        <div class="announcement-box">
            <span>انتظرونا اليوم</span>
        </div>

        <div class="main-title">
            <h2>بدء التقديم لمسابقة</h2>
            <h1>حامل القـرآن <br> الكريم بـمسـير</h1>
        </div>

        <div class="categories">
            <div class="cat-card">
                <h3>حتى سن ١٨ عاماً</h3>
                <div class="level-item"><i class="fas fa-star"></i> القرآن الكريم كاملاً</div>
                <div class="level-item"><i class="fas fa-star"></i> ثلاثة أرباع القرآن</div>
                <div class="level-item"><i class="fas fa-star"></i> نصف القرآن الكريم</div>
                <div class="level-item"><i class="fas fa-star"></i> ربع القرآن الكريم</div>
            </div>

            <div class="cat-card">
                <h3>من سن ٣٠ عاماً فأكثر</h3>
                <div class="level-item"><i class="fas fa-star"></i> القرآن الكريم كاملاً</div>
                <div class="level-item"><i class="fas fa-star"></i> نصف القرآن الكريم</div>
                <div class="level-item" style="opacity: 0.1"><i class="fas fa-minus"></i> -</div>
                <div class="level-item" style="opacity: 0.1"><i class="fas fa-minus"></i> -</div>
            </div>
        </div>

        <div class="footer">
            <div class="divider"></div>
            <div class="url">hamelalquran.com</div>
            <div class="meta-info">
                <span><i class="fas fa-calendar-alt"></i> رمضان 1447هـ</span>
                <span><i class="fas fa-map-marker-alt"></i> مسير - كفر الشيخ</span>
            </div>
        </div>
    </div>

</body>
</html>
