<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات المتسابق | مسابقة حامل القرآن</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Tajawal:wght@400;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .student-profile-card {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary-gold);
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(212, 175, 55, 0.1);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .student-profile-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .profile-photo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 4px solid var(--primary-gold);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            background: #222;
        }
        .profile-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .student-name {
            font-size: 2rem;
            color: var(--primary-gold);
            margin-bottom: 10px;
            font-family: 'Tajawal', sans-serif;
        }
        .student-level {
            color: var(--text-gray);
            font-size: 1.1rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            text-align: right;
        }
        .data-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .data-label {
            color: var(--primary-gold);
            font-size: 0.85rem;
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
        }
        .data-value {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
        }
        .qr-message {
            background: rgba(255, 77, 77, 0.1);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
            border: 1px dashed rgba(255, 77, 77, 0.3);
        }
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .back-home:hover {
            transform: translateX(-5px);
            filter: brightness(1.2);
        }
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
        }
        .loader-spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(212, 175, 55, 0.2);
            border-top-color: var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="loader-spinner"></div>
        <p style="color: var(--primary-gold);">جاري تحميل بيانات المتسابق...</p>
    </div>

    <div class="student-profile-card" id="studentCard" style="display:none;">
        <div class="profile-photo-container">
            <img id="studentPhoto" src="https://via.placeholder.com/150" alt="صورة المتسابق">
        </div>
        
        <h1 class="student-name" id="studentName">الاسم بالكامل</h1>
        <div class="student-level">
            <i class="fas fa-medal"></i>
            <span id="studentLevel">المستوى...</span>
        </div>

        <div class="data-grid">
            <div class="data-item">
                <span class="data-label">رقم الجلوس</span>
                <span class="data-value" id="seatNumber">0000</span>
            </div>
            <div class="data-item">
                <span class="data-label">رقم اللجنة</span>
                <span class="data-value" id="committee">0</span>
            </div>
            <div class="data-item">
                <span class="data-label">الجنس</span>
                <span class="data-value" id="gender">...</span>
            </div>
            <div class="data-item">
                <span class="data-label">العنوان</span>
                <span class="data-value" id="address" style="font-size: 0.95rem;">...</span>
            </div>
        </div>

        <div class="qr-message">
            <i class="fas fa-info-circle"></i>
            <br>
            هذا الكود خاص بك، غير مطالب به يوم الاختبار، هو فقط مرجع لك في حال نسيان رقم الجلوس أو اللجنة.
        </div>

        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-right"></i>
            العودة للرئيسية
        </a>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsVH5BVV9abx66UicOa51T1qADmUVrd7U",
            authDomain: "hamel-b7a68.firebaseapp.com",
            projectId: "hamel-b7a68",
            storageBucket: "hamel-b7a68.firebasestorage.app",
            messagingSenderId: "818022836347",
            appId: "1:818022836347:web:ebcdef3f19c53cd1ef1ade",
            measurementId: "G-HEMLZDRBS3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = urlParams.get('id');

            if (!studentId) {
                alert('عذراً، الرابط غير صحيح.');
                window.location.href = 'index.html';
                return;
            }

            try {
                const doc = await db.collection('registrations').doc(studentId).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('studentName').textContent = data.studentName;
                    document.getElementById('studentLevel').textContent = data.level;
                    document.getElementById('seatNumber').textContent = data.seatNumber;
                    document.getElementById('committee').textContent = data.committee;
                    document.getElementById('gender').textContent = data.gender;
                    document.getElementById('address').textContent = data.address || 'غير مسجل';
                    
                    if (data.personalPhotoPath) {
                        document.getElementById('studentPhoto').src = data.personalPhotoPath;
                    }

                    document.getElementById('loadingOverlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loadingOverlay').style.display = 'none';
                        document.getElementById('studentCard').style.display = 'block';
                    }, 500);
                } else {
                    alert('عذراً، لم يتم العثور على بيانات المتسابق.');
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error("Error fetching student data:", error);
                alert('حدث خطأ أثناء تحميل البيانات.');
            }
        });
    </script>
</body>
</html>
