<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوستر النسخة الفحمية | مسابقة حامل القرآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --charcoal: #121212;
            --muted-gold: #a68936;
            --dusty-gold: #7d6627;
            --text-off: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Tajawal', sans-serif; }
        .poster {
            width: 1080px; height: 1080px;
            background: #000;
            border: 2px solid var(--muted-gold);
            position: relative; display: flex; flex-direction: column; align-items: center; padding: 80px;
        }
        .outer-border { position: absolute; inset: 20px; border: 1px solid var(--dusty-gold); }
        .inner-content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        .sponsor { background: var(--muted-gold); color: #000; padding: 10px 50px; border-radius: 5px; font-weight: 900; font-size: 1.8rem; margin-bottom: 50px; }
        .title-group { text-align: center; margin-bottom: 60px; }
        .title-group span { display: block; color: var(--muted-gold); font-size: 2rem; letter-spacing: 5px; margin-bottom: 10px; }
        .title-group h1 { font-family: 'Amiri', serif; font-size: 6.5rem; color: #fff; line-height: 1; }
        .sections { display: flex; gap: 50px; width: 100%; align-items: stretch; }
        .sec { flex: 1; border-right: 2px solid var(--dusty-gold); padding-right: 30px; }
        .sec:last-child { border-right: none; }
        .sec h2 { font-size: 2.2rem; color: var(--muted-gold); margin-bottom: 30px; }
        .entry { display: flex; align-items: center; gap: 15px; color: var(--text-off); font-size: 1.9rem; margin-bottom: 25px; font-weight: 500; }
        .entry i { color: var(--muted-gold); font-size: 1.2rem; }
        .new-tag { border: 1px solid var(--muted-gold); color: var(--muted-gold); padding: 2px 10px; font-size: 1rem; border-radius: 4px; margin-right: auto; }
        .bottom-url { margin-top: auto; font-size: 2.5rem; color: #fff; font-weight: 900; background: rgba(166, 137, 54, 0.1); padding: 10px 40px; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="poster">
        <div class="outer-border"></div>
        <div class="inner-content">
            <div class="sponsor">برعاية مطبعة أبوخضرة وشباب مسير</div>
            <div class="title-group">
                <span>مسابقة</span>
                <h1>حامل القرآن الكريم بمسير</h1>
            </div>
            <div class="sections">
                <div class="sec">
                    <h2>الأشبال (حتى 18 سنة)</h2>
                    <div class="entry"><i class="fas fa-circle"></i> القرآن كاملاً</div>
                    <div class="entry"><i class="fas fa-circle"></i> ثلاثة أرباع القرآن</div>
                    <div class="entry"><i class="fas fa-circle"></i> نصف القرآن الكريم</div>
                    <div class="entry"><i class="fas fa-circle"></i> ربع القرآن الكريم</div>
                </div>
                <div class="sec">
                    <h2>الكبار (30 سنة فأكثر)</h2>
                    <div class="entry"><i class="fas fa-check"></i> القرآن كاملاً <span class="new-tag">جديد</span></div>
                    <div class="entry"><i class="fas fa-check"></i> نصف القرآن <span class="new-tag">جديد</span></div>
                </div>
            </div>
            <div class="bottom-url">hamelalquran.com</div>
        </div>
    </div>
</body>
</html>
